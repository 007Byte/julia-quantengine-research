<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Presentation Generator</title>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .container { text-align: center; max-width: 600px; }
  h1 { font-size: 28px; margin-bottom: 10px; }
  p { color: #aaa; margin-bottom: 30px; }
  button { background: #4a90d9; color: white; border: none; padding: 18px 48px; font-size: 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
  button:hover { background: #357abd; transform: scale(1.05); }
  #status { margin-top: 20px; font-size: 14px; color: #8bc34a; }
</style>
</head>
<body>
<div class="container">
  <h1>Peter Norvig & Julia Language Presentation</h1>
  <p>Click the button below to generate and download your .pptx file.<br>The file will be created directly in your browser using PptxGenJS.</p>
  <button onclick="generatePresentation()">Generate & Download PPTX</button>
  <div id="status"></div>
</div>
<script>
async function generatePresentation() {
  document.getElementById('status').textContent = 'Generating presentation...';

  const pres = new PptxGenJS();
  pres.layout = 'LAYOUT_16x9';
  pres.author = 'Walker Turbides';
  pres.title = 'Peter Norvig, AI & Cybersecurity | Julia Programming Language';

  // === COLOR PALETTE (Professional dark theme matching WY brand) ===
  const DARK_BG = '0D0D1A';
  const NAVY = '1A1A3E';
  const ACCENT_BLUE = '4A90D9';
  const ACCENT_GOLD = 'C9A84C';
  const WHITE = 'FFFFFF';
  const LIGHT_GRAY = 'B0B0B0';
  const DARK_TEXT = '1A1A3E';
  const CARD_BG = '16213E';

  // Helper: create consistent slide background
  function makeSlide(hasDarkBg) {
    const slide = pres.addSlide();
    slide.background = { color: hasDarkBg ? DARK_BG : NAVY };
    // Bottom accent bar
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.35, w: 10, h: 0.275, fill: { color: ACCENT_BLUE } });
    slide.addText('Walker Turbides | CSCI 112 | March 18, 2026', {
      x: 0.3, y: 5.35, w: 9.4, h: 0.275, fontSize: 8, color: WHITE, align: 'center', fontFace: 'Arial'
    });
    return slide;
  }

  // ====================================================================
  // SLIDE 1 - TITLE SLIDE
  // ====================================================================
  let slide = pres.addSlide();
  slide.background = { color: DARK_BG };
  // Decorative accent lines
  slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.06, fill: { color: ACCENT_GOLD } });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.565, w: 10, h: 0.06, fill: { color: ACCENT_GOLD } });
  // Title
  slide.addText('Peter Norvig\'s Philosophical Impact on AI\n& Its Relationship to Cybersecurity', {
    x: 0.8, y: 0.8, w: 8.4, h: 1.6, fontSize: 28, fontFace: 'Arial', color: WHITE, bold: true, align: 'center', valign: 'middle', lineSpacingMultiple: 1.2
  });
  // Divider
  slide.addShape(pres.shapes.RECTANGLE, { x: 3.5, y: 2.6, w: 3, h: 0.04, fill: { color: ACCENT_GOLD } });
  // Subtitle
  slide.addText('The Julia Programming Language:\nQuantitative Finance & Mathematical Modeling', {
    x: 0.8, y: 2.85, w: 8.4, h: 1.0, fontSize: 20, fontFace: 'Arial', color: ACCENT_BLUE, align: 'center', valign: 'middle', lineSpacingMultiple: 1.2
  });
  // Author info
  slide.addText([
    { text: 'Walker Turbides', options: { fontSize: 16, bold: true, color: WHITE, breakLine: true } },
    { text: 'CSCI 112 \u2013 Programming Concepts', options: { fontSize: 13, color: LIGHT_GRAY, breakLine: true } },
    { text: 'March 18, 2026', options: { fontSize: 13, color: LIGHT_GRAY } }
  ], { x: 0.8, y: 4.1, w: 8.4, h: 1.2, fontFace: 'Arial', align: 'center', valign: 'middle' });

  // ====================================================================
  // SLIDE 2 - AGENDA
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('Agenda', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 28, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });
  // Part I
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 4.2, h: 1.8, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 6, offset: 2, angle: 135, opacity: 0.3 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 0.08, h: 1.8, fill: { color: ACCENT_GOLD } });
  slide.addText('Part I', { x: 0.9, y: 1.4, w: 3.5, h: 0.4, fontSize: 14, fontFace: 'Arial', color: ACCENT_GOLD, bold: true });
  slide.addText([
    { text: 'Peter Norvig\u2019s AI Philosophy', options: { fontSize: 13, color: WHITE, bold: true, breakLine: true } },
    { text: 'AI & Cybersecurity Nexus', options: { fontSize: 12, color: LIGHT_GRAY, breakLine: true } },
    { text: 'Implications for the Future', options: { fontSize: 12, color: LIGHT_GRAY } }
  ], { x: 0.9, y: 1.85, w: 3.5, h: 1.1, fontFace: 'Arial' });
  // Part II
  slide.addShape(pres.shapes.RECTANGLE, { x: 5.2, y: 1.3, w: 4.2, h: 1.8, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 6, offset: 2, angle: 135, opacity: 0.3 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 5.2, y: 1.3, w: 0.08, h: 1.8, fill: { color: ACCENT_BLUE } });
  slide.addText('Part II', { x: 5.5, y: 1.4, w: 3.5, h: 0.4, fontSize: 14, fontFace: 'Arial', color: ACCENT_BLUE, bold: true });
  slide.addText([
    { text: 'Julia Programming Language', options: { fontSize: 13, color: WHITE, bold: true, breakLine: true } },
    { text: 'Quant Finance & Stock Modeling', options: { fontSize: 12, color: LIGHT_GRAY, breakLine: true } },
    { text: '10-Point Language Analysis', options: { fontSize: 12, color: LIGHT_GRAY } }
  ], { x: 5.5, y: 1.85, w: 3.5, h: 1.1, fontFace: 'Arial' });
  // Timeline bar
  slide.addText('5-Minute Preliminary Research Presentation', {
    x: 0.6, y: 3.5, w: 8.8, h: 0.5, fontSize: 14, fontFace: 'Arial', color: ACCENT_BLUE, align: 'center', italic: true
  });

  // ====================================================================
  // SLIDE 3 - WHO IS PETER NORVIG?
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('Who Is Peter Norvig?', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 28, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });
  slide.addText([
    { text: 'Distinguished Education Fellow, Stanford HAI (Human-Centered AI)', options: { bullet: true, fontSize: 14, color: WHITE, breakLine: true } },
    { text: 'Former Director of Research at Google \u2013 led core search algorithms', options: { bullet: true, fontSize: 14, color: WHITE, breakLine: true } },
    { text: 'Former head of Computational Sciences Division at NASA Ames Research Center', options: { bullet: true, fontSize: 14, color: WHITE, breakLine: true } },
    { text: 'Co-author of Artificial Intelligence: A Modern Approach (AIMA) \u2013 the most widely used AI textbook globally, adopted by 1,500+ universities', options: { bullet: true, fontSize: 14, color: WHITE, breakLine: true } },
    { text: 'Recipient of the NASA Exceptional Achievement Award (2001)', options: { bullet: true, fontSize: 14, color: WHITE } }
  ], { x: 0.8, y: 1.2, w: 8.4, h: 3.8, fontFace: 'Arial', paraSpaceAfter: 10, valign: 'top' });

  // ====================================================================
  // SLIDE 4 - NORVIG'S AI PHILOSOPHY
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('Norvig\u2019s AI Philosophy', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 28, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });
  // Three pillars as cards
  const pillars = [
    { title: 'Rational Agent Framework', desc: 'AI systems should act to maximize expected utility based on evidence and reasoning \u2013 foundational to AIMA\u2019s approach', color: ACCENT_GOLD },
    { title: 'Human-Centered AI', desc: 'AI must be safer, more reliable, and serve human needs \u2013 AGI debate misses the real point of practical impact', color: ACCENT_BLUE },
    { title: 'Data-Driven Pragmatism', desc: '"The Unreasonable Effectiveness of Data" \u2013 scale and data often outperform clever algorithms', color: 'E07C4F' }
  ];
  pillars.forEach((p, i) => {
    const xPos = 0.6 + (i * 3.1);
    slide.addShape(pres.shapes.RECTANGLE, { x: xPos, y: 1.3, w: 2.8, h: 2.8, fill: { color: CARD_BG },
      shadow: { type: 'outer', color: '000000', blur: 6, offset: 2, angle: 135, opacity: 0.3 }
    });
    slide.addShape(pres.shapes.RECTANGLE, { x: xPos, y: 1.3, w: 2.8, h: 0.06, fill: { color: p.color } });
    slide.addText(p.title, { x: xPos + 0.15, y: 1.5, w: 2.5, h: 0.5, fontSize: 13, fontFace: 'Arial', color: p.color, bold: true });
    slide.addText(p.desc, { x: xPos + 0.15, y: 2.05, w: 2.5, h: 1.8, fontSize: 11, fontFace: 'Arial', color: LIGHT_GRAY, valign: 'top' });
  });
  slide.addText('Core Thesis: AI today is already "general" \u2013 what truly matters is making it safe, trustworthy, and beneficial.', {
    x: 0.6, y: 4.3, w: 8.8, h: 0.6, fontSize: 12, fontFace: 'Arial', color: ACCENT_BLUE, italic: true, align: 'center'
  });

  // ====================================================================
  // SLIDE 5 - AI & CYBERSECURITY NEXUS
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('AI & Cybersecurity: The Norvig Perspective', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 26, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });
  // Left card - Challenge
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 4.2, h: 2.5, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 6, offset: 2, angle: 135, opacity: 0.3 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 4.2, h: 0.06, fill: { color: 'E04F5F' } });
  slide.addText('The Challenge', { x: 0.8, y: 1.5, w: 3.8, h: 0.4, fontSize: 15, fontFace: 'Arial', color: 'E04F5F', bold: true });
  slide.addText([
    { text: 'Industry prioritized speed over security', options: { bullet: true, fontSize: 12, color: WHITE, breakLine: true } },
    { text: 'Massive losses from data breaches & extortion', options: { bullet: true, fontSize: 12, color: WHITE, breakLine: true } },
    { text: 'AI provides powerful new attack vectors', options: { bullet: true, fontSize: 12, color: WHITE, breakLine: true } },
    { text: 'Tools shipped without safety guarantees', options: { bullet: true, fontSize: 12, color: WHITE } }
  ], { x: 0.8, y: 2.0, w: 3.8, h: 1.5, fontFace: 'Arial', paraSpaceAfter: 6 });
  // Right card - Opportunity
  slide.addShape(pres.shapes.RECTANGLE, { x: 5.2, y: 1.3, w: 4.2, h: 2.5, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 6, offset: 2, angle: 135, opacity: 0.3 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 5.2, y: 1.3, w: 4.2, h: 0.06, fill: { color: '4CAF50' } });
  slide.addText('The Opportunity', { x: 5.4, y: 1.5, w: 3.8, h: 0.4, fontSize: 15, fontFace: 'Arial', color: '4CAF50', bold: true });
  slide.addText([
    { text: 'AI is a stronger tool for defenders than attackers', options: { bullet: true, fontSize: 12, color: WHITE, breakLine: true } },
    { text: 'Anomaly detection & threat intelligence at scale', options: { bullet: true, fontSize: 12, color: WHITE, breakLine: true } },
    { text: 'Automated incident response & vulnerability scanning', options: { bullet: true, fontSize: 12, color: WHITE, breakLine: true } },
    { text: 'Build systems to a more reliable standard', options: { bullet: true, fontSize: 12, color: WHITE } }
  ], { x: 5.4, y: 2.0, w: 3.8, h: 1.5, fontFace: 'Arial', paraSpaceAfter: 6 });
  // Bottom quote
  slide.addText('Norvig (2025): Cybersecurity experts believe AI may be a better tool for the defenders than for the attackers.', {
    x: 0.6, y: 4.1, w: 8.8, h: 0.6, fontSize: 11, fontFace: 'Arial', color: ACCENT_GOLD, italic: true, align: 'center'
  });

  // ====================================================================
  // SLIDE 6 - AI AUTONOMY & SAFETY
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('AI Autonomy, Safety & Cybersecurity Implications', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 24, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });
  slide.addText([
    { text: 'Russell & Norvig\u2019s AIMA framework underpins modern AI safety research', options: { bullet: true, fontSize: 13, color: WHITE, breakLine: true } },
    { text: '2025 research warns: frontier AI models attempt to disable oversight controls when pursuing goals', options: { bullet: true, fontSize: 13, color: WHITE, breakLine: true } },
    { text: 'Norvig advocates building AI systems to a more reliable security standard rather than accepting losses', options: { bullet: true, fontSize: 13, color: WHITE, breakLine: true } },
    { text: 'The rational agent model demands that AI agents operate within human-defined constraints \u2013 a direct cybersecurity principle', options: { bullet: true, fontSize: 13, color: WHITE, breakLine: true } },
    { text: 'Key Takeaway: Norvig\u2019s philosophy connects AI design to cybersecurity by insisting on safety, reliability, and human oversight as non-negotiable design requirements', options: { bullet: true, fontSize: 13, color: ACCENT_BLUE, bold: true } }
  ], { x: 0.8, y: 1.2, w: 8.4, h: 3.8, fontFace: 'Arial', paraSpaceAfter: 12, valign: 'top' });

  // ====================================================================
  // SLIDE 7 - TRANSITION TO JULIA
  // ====================================================================
  slide = pres.addSlide();
  slide.background = { color: NAVY };
  slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.06, fill: { color: ACCENT_GOLD } });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.565, w: 10, h: 0.06, fill: { color: ACCENT_GOLD } });
  slide.addText('Part II', { x: 0.6, y: 1.0, w: 8.8, h: 0.6, fontSize: 16, fontFace: 'Arial', color: ACCENT_BLUE, align: 'center' });
  slide.addText('The Julia Programming Language', {
    x: 0.6, y: 1.6, w: 8.8, h: 1.0, fontSize: 34, fontFace: 'Arial', color: WHITE, bold: true, align: 'center'
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 3.5, y: 2.8, w: 3, h: 0.04, fill: { color: ACCENT_GOLD } });
  slide.addText('Quantitative Finance & Mathematical Modeling\nof the Stock Market', {
    x: 0.6, y: 3.0, w: 8.8, h: 1.0, fontSize: 20, fontFace: 'Arial', color: ACCENT_BLUE, align: 'center', lineSpacingMultiple: 1.3
  });

  // ====================================================================
  // SLIDE 8 - JULIA: ORIGIN & CLASSIFICATION (Points 1-5)
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('Julia: Origin & Classification', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 28, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });

  const juliaFacts = [
    ['(1) Language Name', 'Julia'],
    ['(2) Inventors', 'Jeff Bezanson, Stefan Karpinski, Viral B. Shah, and Alan Edelman (MIT)'],
    ['(3) Year Invented', 'Development began 2009; publicly launched February 14, 2012; v1.0 released August 2018'],
    ['(4) Classification', 'High-level, general-purpose, dynamically typed, with strong numerical and scientific computing focus'],
    ['(5) Compiled or Interpreted', 'Both \u2013 JIT (Just-In-Time) compiled via LLVM; feels like an interpreted language but compiles to efficient native machine code at runtime']
  ];
  juliaFacts.forEach((f, i) => {
    const yPos = 1.2 + (i * 0.78);
    slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: yPos, w: 8.8, h: 0.7, fill: { color: i % 2 === 0 ? CARD_BG : NAVY } });
    slide.addText(f[0], { x: 0.8, y: yPos, w: 2.8, h: 0.7, fontSize: 11, fontFace: 'Arial', color: ACCENT_BLUE, bold: true, valign: 'middle' });
    slide.addText(f[1], { x: 3.6, y: yPos, w: 5.6, h: 0.7, fontSize: 11, fontFace: 'Arial', color: WHITE, valign: 'middle' });
  });

  // ====================================================================
  // SLIDE 9 - JULIA: SECURITY, PURPOSE, AI TOOLS (Points 6-8)
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('Julia: Security, Purpose & AI Tools', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 28, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });

  // Point 6
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.25, w: 8.8, h: 1.2, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 4, offset: 1, angle: 135, opacity: 0.2 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.25, w: 0.06, h: 1.2, fill: { color: ACCENT_GOLD } });
  slide.addText('(6) Built-In Security Features', { x: 0.85, y: 1.25, w: 8.3, h: 0.35, fontSize: 13, fontFace: 'Arial', color: ACCENT_GOLD, bold: true });
  slide.addText('Type-safe system prevents common memory errors; sandboxed package manager with SHA-based verification; no pointer arithmetic (unlike C/C++); immutable data structures available; strong module system for encapsulation. Note: Julia is still maturing in formal security certifications.', {
    x: 0.85, y: 1.6, w: 8.3, h: 0.8, fontSize: 11, fontFace: 'Arial', color: LIGHT_GRAY, valign: 'top'
  });

  // Point 7
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 2.65, w: 8.8, h: 1.2, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 4, offset: 1, angle: 135, opacity: 0.2 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 2.65, w: 0.06, h: 1.2, fill: { color: ACCENT_BLUE } });
  slide.addText('(7) Main Purpose / Use', { x: 0.85, y: 2.65, w: 8.3, h: 0.35, fontSize: 13, fontFace: 'Arial', color: ACCENT_BLUE, bold: true });
  slide.addText('Designed to solve the "two-language problem" \u2013 prototype in Python, rewrite in C for speed. Julia delivers both. Primary domains: scientific computing, numerical analysis, quantitative finance, machine learning, data science, and high-performance simulations.', {
    x: 0.85, y: 3.0, w: 8.3, h: 0.8, fontSize: 11, fontFace: 'Arial', color: LIGHT_GRAY, valign: 'top'
  });

  // Point 8
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 4.05, w: 8.8, h: 1.1, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 4, offset: 1, angle: 135, opacity: 0.2 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 4.05, w: 0.06, h: 1.1, fill: { color: 'E07C4F' } });
  slide.addText('(8) Recommended AI Coding Assistant', { x: 0.85, y: 4.05, w: 8.3, h: 0.35, fontSize: 13, fontFace: 'Arial', color: 'E07C4F', bold: true });
  slide.addText('GitHub Copilot (rated "Excellent" for Julia support) \u2013 provides accurate code completions and understands Julia idioms. Alternatives: Claude (Anthropic) for complex reasoning about Julia code; Cursor IDE for real-time pair-programming.', {
    x: 0.85, y: 4.4, w: 8.3, h: 0.7, fontSize: 11, fontFace: 'Arial', color: LIGHT_GRAY, valign: 'top'
  });

  // ====================================================================
  // SLIDE 10 - JULIA: STANDARDS & PERSONAL INTEREST (Points 9-10)
  // ====================================================================
  slide = makeSlide(true);
  slide.addText('Julia: Standards & Personal Interest', {
    x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontSize: 28, fontFace: 'Arial', color: ACCENT_GOLD, bold: true
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: ACCENT_BLUE } });

  // Point 9
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.25, w: 8.8, h: 1.6, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 4, offset: 1, angle: 135, opacity: 0.2 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.25, w: 0.06, h: 1.6, fill: { color: ACCENT_GOLD } });
  slide.addText('(9) ISO or Other Standards', { x: 0.85, y: 1.25, w: 8.3, h: 0.35, fontSize: 13, fontFace: 'Arial', color: ACCENT_GOLD, bold: true });
  slide.addText('Julia is not currently backed by an ISO standard (unlike C, C++, or FORTRAN). It is governed by the Julia open-source community under an MIT License. However, Julia adheres to IEEE 754 for floating-point arithmetic and uses ISO 8601 for date/time representation. Its package ecosystem follows semantic versioning (SemVer) standards.', {
    x: 0.85, y: 1.6, w: 8.3, h: 1.15, fontSize: 11, fontFace: 'Arial', color: LIGHT_GRAY, valign: 'top'
  });

  // Point 10
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 3.1, w: 8.8, h: 2.0, fill: { color: CARD_BG },
    shadow: { type: 'outer', color: '000000', blur: 4, offset: 1, angle: 135, opacity: 0.2 }
  });
  slide.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 3.1, w: 0.06, h: 2.0, fill: { color: ACCENT_BLUE } });
